name: CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/targaryen-nop/orderflow-erp-lite

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Copy docker-compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/orderflow-erp-lite"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        env:
          DOCKER_IMAGE: ${{ env.IMAGE_NAME }}:latest
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DOCKER_IMAGE,MONGODB_URI,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e

            mkdir -p /opt/orderflow-erp-lite
            cd /opt/orderflow-erp-lite

            echo "DOCKER_IMAGE=${DOCKER_IMAGE}" > .env
            echo "MONGODB_URI=${MONGODB_URI}" >> .env

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d

            sleep 10
            docker ps
            docker-compose -f docker-compose.prod.yml ps

      - name: Verify health endpoint
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            for i in {1..10}; do
              if curl -fsS http://127.0.0.1:3000/api/health; then
                echo "Health check passed"
                exit 0
              fi
              echo "Waiting for app..."
              sleep 5
            done
            echo "Health check failed"
            exit 1